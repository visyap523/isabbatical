<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>essays — isabbatical</title>

    <meta property="og:title" content="Essays — isabbatical" />
    <meta property="og:url" content="https://isabbatical.net/essays.html" />
    <meta property="og:type" content="website" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />

    <style>
      /* =============================================
         DESIGN TOKENS — keep identical across all pages
         ============================================= */
      :root {
        --bg:          #FDF8EE;
        --ink:         #1C1C1C;
        --ink-light:   #6B6B6B;
        --accent:      #5B7FA6;
        --border:      #E0DED8;
        --max-width:   680px;
        --font-serif:  'Lora', Georgia, serif;
        --font-sans:   'DM Sans', system-ui, sans-serif;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 18px; }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-sans);
        line-height: 1.7;
        padding: 0 1.5rem;
      }

      .container {
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 3rem 0 6rem;
      }

      /* =============================================
         NAVIGATION
         ============================================= */
      nav {
        display: flex;
        align-items: baseline;
        gap: 1.5rem;
        margin-bottom: 4rem;
        font-size: 0.8rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-weight: 500;
        font-family: var(--font-sans);
      }

      .site-name {
        font-family: var(--font-serif);
        font-size: 1rem;
        font-weight: 600;
        font-style: italic;
        letter-spacing: 0.02em;
        text-transform: none;
        color: var(--ink);
        margin-right: auto;
        text-decoration: none;
      }

      nav a {
        color: var(--ink-light);
        text-decoration: none;
        transition: color 0.2s;
      }

      nav a:hover { color: var(--accent); }
      nav a.current { color: var(--ink); }

      /* =============================================
         PAGE HEADER
         ============================================= */
      .page-header {
        margin-bottom: 2rem;
      }

      .page-header h1 {
        font-family: var(--font-serif);
        font-size: 1.75rem;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 0.5rem;
      }

      .page-header p {
        font-size: 0.9rem;
        color: var(--ink-light);
      }

      /* =============================================
         TAG FILTER BAR
         Clicking a tag filters the essay list.
         In Phase 2 (Astro) this becomes dynamic.
         For now it's visual only — all essays show.
         ============================================= */
      .tag-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 3rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--border);
      }

      .tag {
        font-family: var(--font-sans);
        font-size: 0.7rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ink-light);
        background: transparent;
        border: 1px solid var(--border);
        padding: 0.3rem 0.7rem;
        border-radius: 999px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.15s;
      }

      .tag:hover,
      .tag.active {
        color: var(--accent);
        border-color: var(--accent);
      }

      /* =============================================
         ESSAY LIST
         ============================================= */
      .essay-list {
        list-style: none;
      }

      /* =============================================
         ESSAY ENTRY
         Each entry: date + tags, title, pull quote,
         and a read link.
         ============================================= */
      .essay-entry {
        padding-bottom: 2.5rem;
        margin-bottom: 2.5rem;
        border-bottom: 1px solid var(--border);
      }

      .essay-entry:last-child {
        border-bottom: none;
      }

      .essay-meta {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.6rem;
        flex-wrap: wrap;
      }

      .essay-date {
        font-size: 0.75rem;
        color: var(--ink-light);
        font-family: var(--font-sans);
        letter-spacing: 0.04em;
      }

      .essay-tag {
        font-size: 0.65rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--accent);
        font-family: var(--font-sans);
        text-decoration: none;
      }

      .essay-tag:hover {
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      /* Dot separator between tags */
      .essay-tag + .essay-tag::before {
        content: '·';
        margin-right: 0.75rem;
        color: var(--border);
      }

      .essay-title {
        font-family: var(--font-serif);
        font-size: 1.2rem;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 0.5rem;
        line-height: 1.4;
      }

      .essay-title a {
        color: inherit;
        text-decoration: none;
        transition: color 0.2s;
      }

      .essay-title a:hover {
        color: var(--accent);
      }

      .essay-pullquote {
        font-family: var(--font-serif);
        font-size: 0.9rem;
        font-style: italic;
        color: var(--ink-light);
        line-height: 1.7;
        margin-bottom: 0.85rem;
      }

      .essay-read {
        font-size: 0.8rem;
        font-family: var(--font-sans);
        color: var(--accent);
        text-decoration: underline;
        text-decoration-color: transparent;
        text-underline-offset: 3px;
        transition: text-decoration-color 0.2s;
      }

      .essay-read:hover {
        text-decoration-color: var(--accent);
      }

      /* =============================================
         FOOTER
         ============================================= */
      footer {
        border-top: 1px solid var(--border);
        padding-top: 1.5rem;
        margin-top: 2rem;
        font-size: 0.8rem;
        color: var(--ink-light);
        font-family: var(--font-sans);
      }

      footer a {
        color: var(--ink-light);
        text-decoration: underline;
        text-underline-offset: 3px;
      }

      footer a:hover { color: var(--accent); }

      .footer-note {
        margin-top: 0.5rem;
        font-size: 0.75rem;
        color: var(--ink-light);
        line-height: 1.6;
      }

      /* =============================================
         MOBILE
         ============================================= */
      @media (max-width: 600px) {
        nav {
          flex-wrap: wrap;
          gap: 0.75rem;
          justify-content: center;
        }
        .site-name {
          width: 100%;
          text-align: center;
          margin-right: 0;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">

      <!-- NAVIGATION -->
      <nav>
        <a href="/" class="site-name">isabbatical</a>
        <a href="/about.html">about</a>
        <a href="/essays.html" class="current">essays</a>
        <a href="/sidequests.html">sidequests</a>
      </nav>

      <!-- PAGE HEADER -->
      <header class="page-header">
        <h1>Essays</h1>
        <p>Notes from the sabbatical.</p>
      </header>

      <!-- =============================================
           TAG FILTER BAR
           In Phase 2 these will filter the list dynamically.
           For now they're visual placeholders.
           ============================================= -->
      <div class="tag-bar">
        <a class="tag active" href="#">all</a>
        <a class="tag" href="#">sabbatical</a>
        <a class="tag" href="#">tech</a>
        <a class="tag" href="#">product</a>
        <a class="tag" href="#">walking</a>
        <a class="tag" href="#">writing</a>
        <a class="tag" href="#">money</a>
        <a class="tag" href="#">art</a>
      </div>

      <!-- =============================================
           ESSAY LIST
           To add a new essay:
           1. Copy one <li class="essay-entry"> block
           2. Update the date, tags, title, pull quote, and href
           3. Create a new HTML file for the full essay
           4. git ship
           ============================================= -->
      <ul class="essay-list">

        <!-- ESSAY 1 -->
        <li class="essay-entry">
          <div class="essay-meta">
            <span class="essay-date">TBD</span>
            <a class="essay-tag" href="#">sabbatical</a>
          </div>
          <h2 class="essay-title">
            <a href="/essays/five-weeks-in.html">Five weeks in</a>
          </h2>
          <p class="essay-pullquote">
            "Coming soon"
          </p>
          <a class="essay-read" href="/essays/five-weeks-in.html">Read →</a>
        </li>

        <!-- ADD NEW ESSAYS ABOVE THIS LINE -->

      </ul>

      <!-- FOOTER -->
      <footer>
        <p>© 2026 Isabel Yap · built on sabbatical · <a href="https://www.linkedin.com/in/isabelyap" target="_blank">LinkedIn</a></p>
        <!-- Paste your footer note here -->
      </footer>

    </div>
  </body>
</html>
